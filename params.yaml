preprocess:
  test_size: 0.2
  random_state: 42
  churn_days: 90        #business rule: customers inactive for 90+ days = churned

train:
  model: logistic_regression
  random_state: 42
  # random forest params
  n_estimators: 100
  max_depth: 5

  # logistic regression params
  C: 1.0
  max_iter: 1000

  # xgboost params
  learning_rate: 0.1
  n_estimators_xgb: 100
  
evaluate:
  threshold: 0.5    # probability threshold for classifying as churned